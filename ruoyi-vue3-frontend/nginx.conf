# ============================================================
# 校园二手交易平台 · Web 容器路由（前端镜像内置）
# 一个 nginx 同时：托管管理后台 SPA + 反代后端 API
# 场景：只有静态 IP、无域名，走 HTTP（监听 80）
#   - 管理后台前端调用 /prod-api/*（见 .env.production），转发后端时去掉前缀
#   - Flutter 移动端 + 支付宝 notify 走 /app/*，保留前缀
#   - 后端托管的上传图片走 /profile/*
# ============================================================

upstream trading_backend {
    server backend:8080;          # compose 服务名 backend，同网络 DNS 解析
}

server {
    listen 80;
    server_name _;                # 用 IP 访问，无需域名

    client_max_body_size 100m;    # 商品图片 + APK 上传（APK 约 50MB+），与后端 100MB 限制对齐

    gzip on;
    gzip_min_length 1k;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # 管理后台 API：去掉 /prod-api 前缀再转发后端（proxy_pass 带尾斜杠即替换前缀）
    location /prod-api/ {
        proxy_pass http://trading_backend/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # 移动端 + 支付宝异步回调：保留 /app 前缀（proxy_pass 不带 URI）
    location /app/ {
        proxy_pass http://trading_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # 后端托管的上传文件（-Druoyi.profile 映射到 /profile/**）
    location /profile/ {
        proxy_pass http://trading_backend;
        # 必须覆盖 Host：否则 nginx 默认用上游名 trading_backend（含下划线）作 Host，
        # Tomcat 严格校验 Host 头会因非法字符返回 400，导致 APK/图片等静态文件全部下载失败。
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger / Druid 监控：生产环境禁止外网访问（API 文档与数据源监控不应对公网裸奔）。
    # 后端已通过 -Dspringdoc.*.enabled=false 关闭 Swagger；此处再于入口拦截，双重防护。
    # 本地/内网联调请走 dev 环境（localhost:8080）或临时改回 proxy_pass。
    location ~ ^/(swagger-ui|v3/api-docs|swagger-resources|druid) {
        return 404;
    }

    # 前端 SPA：history 路由回退到 index.html
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
